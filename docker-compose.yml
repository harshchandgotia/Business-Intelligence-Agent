version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    ports:
     - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: harsh2004
      POSTGRES_DB: bi_agent_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bi_agent_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  bi-agent:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:harsh2004@postgres:5432/bi_agent_db
      PYTHONPATH: /app
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
